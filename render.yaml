# Blueprint 100% free en Render:
# - Web Service (free) + Postgres externo gratis (Neon / Supabase)
# - En el dashboard de Render, pega DATABASE_URL de Neon cuando cree el Blueprint.

services:
  - type: web
    name: residencial
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_DEMO
        value: "true"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: UPLOAD_DIR
        value: "/app/uploads"
      - key: WEB_CONCURRENCY
        value: "2"
