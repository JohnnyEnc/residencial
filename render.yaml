# Blueprint 100% free en Render, sin DB externa.
# Usa SQLite dentro del contenedor (los datos se reinician si el servicio se redespliega o se duerme y recrea el disco).

services:
  - type: web
    name: residencial
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/data/residencial.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_DEMO
        value: "true"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: UPLOAD_DIR
        value: "/app/uploads"
      - key: WEB_CONCURRENCY
        value: "1"
