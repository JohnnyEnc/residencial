services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: residencial
      POSTGRES_PASSWORD: residencial
      POSTGRES_DB: residencial
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U residencial -d residencial"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
